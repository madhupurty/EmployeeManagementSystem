# ====================================
# PRODUCTION APPLICATION PROPERTIES
# ====================================
# This profile is activated when running in production/Docker environment
# Environment variables override these defaults

# ====================================
# SERVER CONFIGURATION
# ====================================
server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ====================================
# DATABASE CONFIGURATION
# ====================================
# MySQL Database (values from environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/employee_management_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool (production-optimized)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ====================================
# JPA/HIBERNATE CONFIGURATION
# ====================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ====================================
# JWT CONFIGURATION
# ====================================
# Use strong secret key from environment variable
jwt.secret=${JWT_SECRET:cHJvZHVjdGlvblNlY3JldEtleUZvckVNU0FwcGxpY2F0aW9uMjAyNlByb2R1Y3Rpb24=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ====================================
# LOGGING CONFIGURATION
# ====================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.ems=${LOGGING_LEVEL_COM_EMS:INFO}
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# Log to file in production
logging.file.name=/app/logs/ems-application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ====================================
# SWAGGER/OPENAPI CONFIGURATION
# ====================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Disable Swagger in production (optional - uncomment to disable)
# springdoc.api-docs.enabled=false
# springdoc.swagger-ui.enabled=false

# ====================================
# ACTUATOR CONFIGURATION
# ====================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ====================================
# SECURITY CONFIGURATION
# ====================================
# CORS - Restrict in production
# spring.web.cors.allowed-origins=https://yourdomain.com

# ====================================
# COMPRESSION
# ====================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024
